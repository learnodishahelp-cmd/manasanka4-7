        /* Video Card */

        @keyframes pulse {

        .video-info .play-icon svg { width: 16px; height: 16px; fill: #fff; }
        .video-info .info-text { flex:1; min-width:0; }
        .video-info .part-label {

        .footer {

        .toast {

            background: #004d40; color: white;

            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 10px 20px rgba(0,77,64,0.3);
        }
        .toast.show {
            opacity: 1; transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        @media (max-width: 420px) {
            .app-container { gap: 12px; }
            .header { padding: 16px 12px 12px; }

            .header .icon-row { font-size: 32px; gap: 8px; }
            .part-btn { padding: 9px 12px; font-size: 0.8rem; }
            .info-cards { grid-template-columns: 1fr; gap: 8px; }
            .info-card { padding: 12px 10px; }
            .video-info { padding: 10px 12px; gap: 8px; }
            .video-info .play-icon { width: 30px; height: 30px; }
            .share-btn-top { width: 36px; height: 36px; top: 12px; right: 12px; }
            .share-btn-top svg { width: 18px; height: 18px; }
        }
        @media (min-width: 421px) and (max-width: 768px) {
            .app-container { max-width: 560px; }
        }
        @media (min-width: 769px) {
            .app-container { max-width: 620px; }
            body { padding: 20px; }
        }
    </style>

<body>
    <main class="app-container">
        <!-- Header with Share Button -->
        <header class="header">
            <button class="share-btn-top" id="shareButton" aria-label="Share this app" title="Share Harana App">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
            </button>
            <div class="icon-row">➗🔢🧠</div>

            <p class="subtitle">Division (Harana) – ୩ଟି ଭିଡିଓ</p>

        <!-- Info Cards -->
        <div class="info-cards">

        <!-- Part Buttons -->
        <nav class="parts-nav" id="partsNav" aria-label="Video parts navigation">
            <button class="part-btn active-part" data-video-id="FYDvD_zV5yk" onclick="switchPart('FYDvD_zV5yk', 'ହରଣ - ଭାଗ ୧', this)">୧. ଭାଗ ୧</button>
            <button class="part-btn" data-video-id="uH4oKFHCArA" onclick="switchPart('uH4oKFHCArA', 'ହରଣ - ଭାଗ ୨', this)">୨. ଭାଗ ୨</button>
            <button class="part-btn" data-video-id="amZjmBnZTHw" onclick="switchPart('amZjmBnZTHw', 'ହରଣ - ଭାଗ ୩', this)">୩. ଭାଗ ୩</button>
        </nav>

        <!-- Video Player -->
        <div class="video-card" id="videoCard">
            <div class="video-wrapper">
                <iframe id="videoIframe" src="https://www.youtube.com/embed/FYDvD_zV5yk?rel=0&modestbranding=1"
                    title="ହରଣ - ଭାଗ ୧ | Class 4 Division Part 1"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen loading="lazy">
                </iframe>
            </div>
            <div class="video-info">
                <div class="play-icon">
                    <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
                </div>
                <div class="info-text">
                    <span class="part-label" id="partLabel">ହରଣ</span>
                    <div class="part-title" id="partTitle">ହରଣ - ଭାଗ ୧</div>

        <footer class="footer">
            ✨ ଶ୍ରେଣୀ ୪ <span>ହରଣ (Division)</span> | ୩ଟି ଭିଡିଓ | Share & Learn ✨
        </footer>

    <!-- Toast Notification -->
    <div class="toast" id="toast" aria-live="polite">🔗 ଲିଙ୍କ କପି ହୋଇଛି!</div>

    <script>
        (function() {
            const iframe = document.getElementById('videoIframe');
            const partLabel = document.getElementById('partLabel');
            const partTitle = document.getElementById('partTitle');
            const allPartBtns = document.querySelectorAll('.part-btn');

            let currentVideoId = 'FYDvD_zV5yk';

            window.switchPart = function(videoId, title, btnElement) {
                if (videoId === currentVideoId) return;

                // Update active button
                allPartBtns.forEach(btn => btn.classList.remove('active-part'));
                if (btnElement) btnElement.classList.add('active-part');

                currentVideoId = videoId;
                iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1`;
                partTitle.textContent = title;

                // Visual feedback
                const videoCard = document.getElementById('videoCard');
                videoCard.style.transform = 'scale(1.015)';
                videoCard.style.transition = 'transform 0.2s ease-out';
                setTimeout(() => { videoCard.style.transform = 'scale(1)'; }, 200);

                if (btnElement) {
                    btnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
                if (navigator.vibrate) navigator.vibrate(8);
            };

            // Share functionality
            const SHARE_URL = 'https://learnodishahelp-cmd.github.io/Quizmaster4/';
            const SHARE_TITLE = 'ଶ୍ରେଣୀ ୪ - ହରଣ ଶିଖିବା | Class 4 Division';
            const SHARE_TEXT = 'ଓଡ଼ିଆ ମାଧ୍ୟମରେ ହରଣ (Division) ଶିଖନ୍ତୁ! Check out this Class 4 Division learning app.';

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            async function handleShare() {
                if (navigator.share) {
                    try {
                        await navigator.share({ title: SHARE_TITLE, text: SHARE_TEXT, url: SHARE_URL });
                    } catch (e) {}
                } else {
                    try {
                        await navigator.clipboard.writeText(SHARE_URL);
                        showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                    } catch (e) {
                        const ta = document.createElement('textarea');
                        ta.value = SHARE_URL;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                    }
                }
            }

            document.getElementById('shareButton').addEventListener('click', handleShare);

            // Touch feedback for part buttons
            document.querySelectorAll('.part-btn').forEach(btn => {
                btn.addEventListener('touchstart', function() {
                    this.style.transform = 'scale(0.94)';
                    this.style.transition = 'transform 0.1s ease';
                }, { passive: true });
                btn.addEventListener('touchend', function() {
                    this.style.transform = '';
                    this.style.transition = 'transform 0.2s ease';
                });
                btn.addEventListener('touchcancel', function() {
                    this.style.transform = '';
                });
            });

            // Keyboard navigation
            document.addEventListener('keydown', function(e) {
                const ids = ['FYDvD_zV5yk', 'uH4oKFHCArA', 'amZjmBnZTHw'];
                const currentIndex = ids.indexOf(currentVideoId);
                if (e.key === 'ArrowRight' && currentIndex < ids.length - 1) {
                    e.preventDefault();
                    const nextId = ids[currentIndex + 1];
                    const btn = document.querySelector(`.part-btn[data-video-id="${nextId}"]`);
                    if (btn) switchPart(nextId, btn.textContent.trim(), btn);
                } else if (e.key === 'ArrowLeft' && currentIndex > 0) {
                    e.preventDefault();
                    const prevId = ids[currentIndex - 1];
                    const btn = document.querySelector(`.part-btn[data-video-id="${prevId}"]`);
                    if (btn) switchPart(prevId, btn.textContent.trim(), btn);
                }
            });

            console.log('✅ ହରଣ ଶିଖିବା ଆପ୍ ପ୍ରସ୍ତୁତ | Harana Sikhiba (Division) App – 3 parts');
        })();
    </script>
