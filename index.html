    <script>
        (function() {
            const videoData = {
                1: { id: 'RKSMqbRb5F8', title: 'ବୈଦିକ ଗଣିତ - ପ୍ରଥମ ଭାଗ', label: 'ଭାଗ ୧', start: 23 },
                2: { id: '1umiUobZ_Xk', title: 'ବୈଦିକ ଗଣିତ - ଦ୍ୱିତୀୟ ଭାଗ', label: 'ଭାଗ ୨', start: 0 },
                3: { id: '_gF-NSkzTNw', title: 'ବୈଦିକ ଗଣିତ - ତୃତୀୟ ଭାଗ', label: 'ଭାଗ ୩', start: 0 },
                4: { id: 'Hn-UxKN_rZM', title: 'ବୈଦିକ ଗଣିତ - ଚତୁର୍ଥ ଭାଗ', label: 'ଭାଗ ୪', start: 0 }
            };

            let currentPart = 1;
            let isSwitching = false;
            const SHARE_URL = 'https://learnodishahelp-cmd.github.io/Quizmaster4/';
            const SHARE_TITLE = 'ଶ୍ରେଣୀ ୪ - ବୈଦିକ ଗଣିତ | Class 4 Vedic Math';
            const SHARE_TEXT = 'ଓଡ଼ିଆ ମାଧ୍ୟମରେ ବୈଦିକ ଗଣିତ ଶିଖନ୍ତୁ! Check out this Class 4 Baidika Ganita app.';

            window.switchPart = function(partNumber, videoId, btnElement, startSec = 0) {
                if (isSwitching || partNumber === currentPart) return;
                isSwitching = true;

                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                if (btnElement) btnElement.classList.add('active');
                currentPart = partNumber;

                const data = videoData[partNumber];
                const iframe = document.getElementById('videoIframe');
                let src = `https://www.youtube.com/embed/${data.id}?rel=0&modestbranding=1`;
                if (data.start && data.start > 0) {
                    src += `&start=${data.start}`;
                }
                iframe.src = src;

                document.getElementById('partLabel').textContent = data.label;
                document.getElementById('partTitle').textContent = data.title;

                const videoCard = document.getElementById('videoCard');
                videoCard.style.transform = 'scale(1.015)';
                videoCard.style.transition = 'transform 0.2s ease-out';
                setTimeout(() => { videoCard.style.transform = 'scale(1)'; }, 200);

                if (btnElement) {
                    btnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }

                setTimeout(() => { isSwitching = false; }, 400);
                if (navigator.vibrate) navigator.vibrate(8);
            };

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            async function handleShare() {
                if (navigator.share) {
                    try {
                        await navigator.share({ title: SHARE_TITLE, text: SHARE_TEXT, url: SHARE_URL });
                    } catch (e) {}
                } else {
                    try {
                        await navigator.clipboard.writeText(SHARE_URL);
                        showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                    } catch (e) {
                        const ta = document.createElement('textarea');
                        ta.value = SHARE_URL;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                    }
                }
            }

            document.getElementById('shareButton').addEventListener('click', handleShare);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('touchstart', function() {
                    this.style.transform = 'scale(0.94)';
                    this.style.transition = 'transform 0.1s ease';
                }, { passive: true });
                btn.addEventListener('touchend', function() {
                    this.style.transform = '';
                    this.style.transition = 'transform 0.2s ease';
                });
                btn.addEventListener('touchcancel', function() {
                    this.style.transform = '';
                });
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowRight' && currentPart < 4) {
                    e.preventDefault();
                    const next = currentPart + 1;
                    const btn = document.querySelector(`.tab-btn[data-part="${next}"]`);
                    if (btn) switchPart(next, videoData[next].id, btn, videoData[next].start);
                } else if (e.key === 'ArrowLeft' && currentPart > 1) {
                    e.preventDefault();
                    const prev = currentPart - 1;
                    const btn = document.querySelector(`.tab-btn[data-part="${prev}"]`);
                    if (btn) switchPart(prev, videoData[prev].id, btn, videoData[prev].start);
